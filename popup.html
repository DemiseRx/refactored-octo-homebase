<!DOCTYPE html>
<html>
  <head>
      <meta charset=utf-8>
      <title>Instant Data Scraper</title>
      <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
      <link rel="stylesheet" type="text/css" href="css/handsontable.full.min.css">
      <link rel="stylesheet" type="text/css" href="popup.css">
  </head>
  <body>
	  <div id="wait">
          <h1 id="waitHeader">Please wait...</h1>
          <div id="noResponseErr" class="alert alert-danger" style="display: none;"></div>
          <img src="webrobots_logo.png" id="wait-spider"/>
      </div>
      <div id="content" style="display: none;">
          <div class="col-xs-5">
              <div id="ids-search-wrap" class="form-group" style="margin-bottom:10px;">
                <label for="ids-search" style="font-weight:600;">Search for data</label>
                <input id="ids-search"
                       type="text"
                       class="form-control"
                       placeholder='e.g., "ACME Corp" or "555-123-4567"'>
                <small style="display:block;color:#666;margin-top:4px;">
                  When you click “Try another table,” IDS will jump to the table/list that contains this text (if found).
                </small>
              </div>
              <button type="button" class="btn btn-default btn-block" id='try-another-table-btn'>Try another table</button>
              <button type="button" class="btn btn-primary btn-block" id='nextButton'>Locate "Next" button</button>
              <button type="button" class="btn btn-primary btn-block" id='startScraping'>Start crawling</button>
              <button type="button" class="btn btn-default btn-block" id='stopScraping'>Stop crawling</button>

              <div id="infinateScrollElement">
                  <input type="checkbox" id="infinateScroll">
                  <label for="infinateScroll" id="infinateScrollLabel">Infinite scroll</label>
              </div>

              <form class="btn-block">
                  <div class="input-group btn-block">
                      <span class="input-group-addon">Min delay</span>
                      <input id='crawlDelay' type='number' value='1' class="form-control" />
                      <span class="input-group-addon">sec</span>
                  </div>
                  <div class="input-group btn-block">
                      <span class="input-group-addon">Max delay</span>
                      <input id='maxWait' type='number' value='20' class="form-control" />
                      <span class="input-group-addon">sec</span>
                  </div>
             </form>
          </div>
          <div class="col-xs-3">
              <button type="button" class="btn btn-success download-button  btn-block" id='csv'><span class="glyphicon glyphicon-download-alt"></span> CSV</button><br>
              <button type="button" class="btn btn-success download-button  btn-block" id='xlsx'><span class="glyphicon glyphicon-download-alt"></span> XLSX</button>
			        <button type="button" class="btn btn-success download-button  btn-block" id='copy'><span class="glyphicon glyphicon-copy"></span> COPY ALL</button>
              <button type="button" class="btn btn-success btn-block d-none" id='editPrecanned'><span class="glyphicon glyphicon-edit"></span> EDIT AGENT</button>
              <button type="button" class="btn btn-success btn-block d-none" id='createPrecanned'><span class="glyphicon glyphicon-wrench"></span> CREATE AGENT</button>
              <button type="button" class="btn btn-warning btn-block" id='resetColumns'>Reset columns</button>
          </div>
          <div class="col-xs-4">
              <a href=https://webrobots.io/instantdata id="help" target="_blank"><span class="glyphicon glyphicon-info-sign"></span> Help/Feedback</a>
              <div id="stats"></div>
          </div>
          <div class="col-xs-12" id="info">
               <div class="alert alert-danger" id="error" style="display: none;"></div>
               <div class="alert alert-success" id="pleaseRate" style="display: none;">
                   If you like this extension, please rate it in chrome store:
                   <button type="button" class="btn btn-success download-button" id="rate">Rate</button>
                   <button type="button" class="btn btn-success download-button" id="rateLater">Later</button>
               </div>
               <div class="alert alert-warning" id="inputError" style="display: none;"></div>
               <div class="alert alert-warning" id="finished" style="display: none;"></div>
               <div class="alert alert-warning" id="previewLimit" style="display: none;"></div>
               <div class="alert alert-info" id="instructions" style="display: none;"></div>
          </div>
          <div class="col-xs-12">
              <div id="hot" class="hot handsontable htRowHeaders htColumnHeaders"></div>
          </div>
      </div>
      <script src="js/papaparse.min.js"></script>
      <script src="js/jquery-3.1.1.min.js"></script>
      <script src="js/FileSaver.js"></script>
      <script src="js/bootstrap.min.js"></script>
      <script src="js/handsontable.full.min.js"></script>
      <script src="js/xlsx.full.min.js"></script>
      <script src="popup.js" type="module"></script>
  </body>
</html>
